<!DOCTYPE html>
<html>
<head>
    <title>CSV Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 30px;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .table th {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            text-align: left;
        }
        .table td {
            padding: 10px;
            text-align: left;
        }
        .table tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        .table tr:nth-child(odd) {
            background-color: #ffffff;
        }
        .filename {
            font-size: 22px;
            font-weight: bold;
            margin-top: 20px;
            color: #4CAF50;
        }
        .container {
            margin: 0 auto;
            max-width: 1200px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CSV Files</h1>
        {% for item in csv_data %}
            <div class="filename">{{ item.filename }}</div>
            {{ item.table|safe }}
        {% endfor %}
    </div>
</body>
</html>
