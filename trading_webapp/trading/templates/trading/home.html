<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trading WebApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gradient-to-tr from-gray-100 to-blue-50 text-gray-800">
    <!-- Navbar -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
          <div class="flex items-center">
            <a href="#" class="text-2xl font-bold text-blue-600">Trading WebApp</a>
          </div>
          <div class="hidden md:block">
            <div class="ml-10 flex items-baseline space-x-4">
              <a href="#" class="text-blue-600 px-3 py-2 rounded-md text-sm font-medium hover:bg-blue-100">Home</a>
              <a href="{% url 'show_all_data' %}" class="text-gray-700 px-3 py-2 rounded-md text-sm font-medium hover:bg-blue-100">Show All Data</a>
              <a href="{% url 'run_all' %}" class="text-gray-700 px-3 py-2 rounded-md text-sm font-medium hover:bg-blue-100">RUN All Data</a>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Hero Section -->
    <section class="py-20 text-center">
      <div class="max-w-2xl mx-auto">
        <h1 class="text-4xl font-extrabold tracking-tight text-gray-900 sm:text-5xl">Welcome to the Trading WebApp</h1>
        <p class="mt-6 text-lg text-gray-600">Use the navigation bar to explore insights, data, and forecasts.</p>
        <a href="{% url 'show_all_data' %}" class="mt-8 inline-block bg-blue-600 text-white px-6 py-3 rounded-xl text-lg font-medium shadow hover:bg-blue-700 transition duration-300">Explore Data</a>
        <a href="{% url 'run_all' %}" class="mt-8 inline-block bg-blue-600 text-white px-6 py-3 rounded-xl text-lg font-medium shadow hover:bg-blue-700 transition duration-300">RUN ALL</a>
      </div>
    </section>

    <!-- Footer -->
    <footer class="bg-white shadow-inner py-4">
      <div class="max-w-7xl mx-auto px-4 text-center text-sm text-gray-500">
        &copy; 2025 Trading WebApp. All rights reserved.
      </div>
    </footer>
  </body>
</html>
